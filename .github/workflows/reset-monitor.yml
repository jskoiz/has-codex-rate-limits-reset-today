name: Reset Monitor

on:
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production reset monitor
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          clean_secret="${CRON_SECRET#\"}"
          clean_secret="${clean_secret%\"}"
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer ${clean_secret}" \
            -X POST \
            "https://hascodexratelimitreset.today/api/automation/poll"
