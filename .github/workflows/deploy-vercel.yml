name: Deploy Vercel

on:
  push:
    branches:
      - main
    paths-ignore:
      - "data/site-state.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build production output
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy production output
        run: |
          set -euo pipefail
          log_file="$(mktemp)"
          trap 'rm -f "$log_file"' EXIT

          set +e
          vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}" >"$log_file" 2>&1
          deploy_status=$?
          set -e

          cat "$log_file"
          deployment_url="$(grep -Eo 'https://[^ ]+\\.vercel\\.app' "$log_file" | tail -n 1)"

          if [ -z "$deployment_url" ]; then
            exit "$deploy_status"
          fi

          if [ "$deploy_status" -ne 0 ]; then
            echo "Vercel CLI exited with $deploy_status; confirming deployment state for $deployment_url."
          fi

          vercel inspect "$deployment_url" --wait --timeout 5m --format=json --token="${{ secrets.VERCEL_TOKEN }}" \
            | jq -e '.readyState == "READY"'
