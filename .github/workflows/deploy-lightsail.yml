name: Deploy Lightsail

on:
  push:
    branches:
      - main
    paths-ignore:
      - "data/site-state.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-lightsail-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-west-2
      LIGHTSAIL_INSTANCE_NAME: mls-scraper-worker
      LIGHTSAIL_INSTANCE_IP: 44.240.202.85
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare deployment bundle
        run: |
          git archive --format=tar.gz --output codex-limit.tgz "$GITHUB_SHA"

      - name: Build runtime env file
        run: |
          cat > codex-limit.env <<EOF
          AI_REVIEW_EMAIL=${{ secrets.AI_REVIEW_EMAIL }}
          CRON_SECRET=${{ secrets.CRON_SECRET }}
          GITHUB_REPO_BRANCH=${{ secrets.APP_GITHUB_REPO_BRANCH }}
          GITHUB_REPO_NAME=${{ secrets.APP_GITHUB_REPO_NAME }}
          GITHUB_REPO_OWNER=${{ secrets.APP_GITHUB_REPO_OWNER }}
          GITHUB_TOKEN=${{ secrets.APP_GITHUB_TOKEN }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_REASONING_MODEL=${{ secrets.OPENAI_REASONING_MODEL }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
          RETTIWT_API_KEY=${{ secrets.RETTIWT_API_KEY }}
          SITE_ADMIN_PASSWORD=${{ secrets.SITE_ADMIN_PASSWORD }}
          SITE_ANALYTICS_URL=${{ secrets.SITE_ANALYTICS_URL }}
          SITE_BASE_URL=${{ secrets.SITE_BASE_URL }}
          SITE_PRIVATE_STATE_SECRET=${{ secrets.SITE_PRIVATE_STATE_SECRET }}
          SITE_SESSION_SECRET=${{ secrets.SITE_SESSION_SECRET }}
          NODE_ENV=production
          HOST=0.0.0.0
          PORT=3000
          EOF

      - name: Write systemd unit
        run: |
          cat > codex-limit.service <<'EOF'
          [Unit]
          Description=codex-limit site
          After=network.target

          [Service]
          Type=simple
          User=ubuntu
          Group=ubuntu
          WorkingDirectory=/home/ubuntu/deployments/codex-limit/current
          EnvironmentFile=/etc/codex-limit.env
          ExecStart=/usr/bin/node server.mjs
          Restart=always
          RestartSec=3
          AmbientCapabilities=CAP_NET_BIND_SERVICE
          CapabilityBoundingSet=CAP_NET_BIND_SERVICE
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target
          EOF

          cat > codex-limit-monitor.service <<'EOF'
          [Unit]
          Description=Run codex-limit reset monitor poll
          After=network-online.target codex-limit.service
          Wants=network-online.target

          [Service]
          Type=oneshot
          EnvironmentFile=/etc/codex-limit.env
          ExecStart=/usr/bin/bash -lc 'curl --fail-with-body --silent --show-error --max-time 120 -H "Authorization: Bearer ${CRON_SECRET}" -X POST http://127.0.0.1:3000/api/automation/poll'
          User=ubuntu
          Group=ubuntu
          WorkingDirectory=/home/ubuntu/deployments/codex-limit/current
          EOF

          cat > codex-limit-monitor.timer <<'EOF'
          [Unit]
          Description=Poll codex-limit reset monitor every five minutes

          [Timer]
          OnBootSec=2min
          OnUnitActiveSec=5min
          AccuracySec=30s
          Persistent=true
          Unit=codex-limit-monitor.service

          [Install]
          WantedBy=timers.target
          EOF

      - name: Fetch Lightsail SSH credentials
        run: |
          aws lightsail get-instance-access-details \
            --instance-name "$LIGHTSAIL_INSTANCE_NAME" \
            --protocol ssh \
            --query 'accessDetails' \
            --output json > access-details.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          details = json.loads(Path("access-details.json").read_text())
          Path("lightsail-key").write_text(details["privateKey"])
          Path("lightsail-key-cert.pub").write_text(details["certKey"])
          PY
          chmod 600 lightsail-key lightsail-key-cert.pub

      - name: Upload release
        run: |
          ssh -i lightsail-key -o StrictHostKeyChecking=no ubuntu@"$LIGHTSAIL_INSTANCE_IP" \
            'mkdir -p /home/ubuntu/deployments/codex-limit/current'
          scp -i lightsail-key -o StrictHostKeyChecking=no codex-limit.tgz \
            ubuntu@"$LIGHTSAIL_INSTANCE_IP":/home/ubuntu/deployments/codex-limit/release.tgz
          scp -i lightsail-key -o StrictHostKeyChecking=no codex-limit.env \
            ubuntu@"$LIGHTSAIL_INSTANCE_IP":/home/ubuntu/deployments/codex-limit/codex-limit.env
          scp -i lightsail-key -o StrictHostKeyChecking=no codex-limit.service \
            ubuntu@"$LIGHTSAIL_INSTANCE_IP":/home/ubuntu/deployments/codex-limit/codex-limit.service
          scp -i lightsail-key -o StrictHostKeyChecking=no codex-limit-monitor.service \
            ubuntu@"$LIGHTSAIL_INSTANCE_IP":/home/ubuntu/deployments/codex-limit/codex-limit-monitor.service
          scp -i lightsail-key -o StrictHostKeyChecking=no codex-limit-monitor.timer \
            ubuntu@"$LIGHTSAIL_INSTANCE_IP":/home/ubuntu/deployments/codex-limit/codex-limit-monitor.timer

      - name: Activate release
        run: |
          ssh -i lightsail-key -o StrictHostKeyChecking=no ubuntu@"$LIGHTSAIL_INSTANCE_IP" '
            set -euo pipefail
            rm -rf /home/ubuntu/deployments/codex-limit/current/*
            tar -xzf /home/ubuntu/deployments/codex-limit/release.tgz -C /home/ubuntu/deployments/codex-limit/current
            cd /home/ubuntu/deployments/codex-limit/current
            npm ci --omit=dev
            sudo install -m 600 /home/ubuntu/deployments/codex-limit/codex-limit.env /etc/codex-limit.env
            sudo install -m 644 /home/ubuntu/deployments/codex-limit/codex-limit.service /etc/systemd/system/codex-limit.service
            sudo install -m 644 /home/ubuntu/deployments/codex-limit/codex-limit-monitor.service /etc/systemd/system/codex-limit-monitor.service
            sudo install -m 644 /home/ubuntu/deployments/codex-limit/codex-limit-monitor.timer /etc/systemd/system/codex-limit-monitor.timer
            sudo systemctl daemon-reload
            sudo systemctl enable codex-limit.service
            sudo systemctl restart codex-limit.service
            sudo systemctl enable --now codex-limit-monitor.timer
            sleep 2
            systemctl is-active codex-limit.service
            systemctl is-active codex-limit-monitor.timer
            curl -fsS http://127.0.0.1/api/status >/dev/null
          '
